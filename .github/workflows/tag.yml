# SPDX-License-Identifier: Apache-2.0
name: Publish
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
jobs:
  Publish:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Publish go-lib-macros
        run: |
            cd macros
            cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}
      - name: Publish
        run: cargo publish go-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}
